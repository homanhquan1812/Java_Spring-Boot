spring:
  # Database connection
  datasource:
    url: jdbc:sqlserver://localhost:1434;databaseName=mydatabase;encrypt=true;trustServerCertificate=true
    username: SA
    password: Quan#1812@2000

  jpa:
    hibernate:
      # ddl-auto controls whether Hibernate is allowed to automatically manage database schema (DDL) based on JPA entities.
      # If none: Uses existing tables only & Required when using Flyway/Liquibase (Best practice).
      # If validate: Hibernate validates schema against entities.
      # If update: Hibernate automatically alters tables (Not good for production).
      ddl-auto: none
    # show-sql: Controls whether Hibernate prints generated SQL statements to the console
    show-sql: false
    # format_sql: Formats SQL to be more readable
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000
      repositories:
        enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: homanhquan1812@gmail.com
    password: srwldxzocvqetzgu
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000

  jackson:
    deserialization:
      fail-on-unknown-properties: false

async:
