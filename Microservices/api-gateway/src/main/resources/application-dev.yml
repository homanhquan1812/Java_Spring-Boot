      ddl-auto: update

    show-sql: true

  # ===== REDIS =====
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms
      repositories:
        enabled: false

  # ===== EMAIL (JavaMailSender) =====
  mail:
    host: smtp.gmail.com
