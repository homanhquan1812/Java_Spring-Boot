version: "3.9"

services:
  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1434:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Quan#1812@2000"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - backend

  # Redis
  # Run on Terminal: docker exec -it my-redis redis-cli
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend

  spring-app:
    build: .
    container_name: product-service
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
      - redis
      - rabbitmq
    networks:
      - backend

networks:
  backend:

volumes:
  sql_data: