name: Spring Boot CI/CD Pipeline with SQL Server, Redis & RabbitMQ

on:
  # Pipeline sẽ chạy khi có push hoặc pull request vào nhánh main hoặc master
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # Môi trường thực thi là Ubuntu mới nhất do GitHub cung cấp
    runs-on: ubuntu-latest

    services:
      # -------------------------------
      # SQL Server 2022 Service
      # -------------------------------
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1434:1433
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "Quan#1812@2000"
          MSSQL_PID: Developer
          MSSQL_COLLATION: SQL_Latin1_General_CP1_CI_AS
        options: >-
          --name=sqlserver
          --health-cmd="/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Quan#1812@2000' -Q 'SELECT 1' -b -o /dev/null"
          --health-interval=20s
          --health-timeout=10s
          --health-retries=15
          --health-start-period=80s

      # -------------------------------
      # Redis Latest Service
      # -------------------------------
      redis:
        image: redis:latest               # Sử dụng Redis latest version
        ports:
          - 6379:6379                     # Ánh xạ cổng host 6379 → container 6379
        options: >-                       # Thiết lập health check cho Redis
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # -------------------------------
      # RabbitMQ 3 Management Service
      # -------------------------------
      rabbitmq:
        image: rabbitmq:3-management      # Sử dụng RabbitMQ 3 với management plugin
        ports:
          - 5672:5672                     # Cổng AMQP
          - 15672:15672                   # Cổng Management UI
        options: >-                       # Thiết lập health check cho RabbitMQ
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    steps:
      # -------------------------------
      # 1. Checkout source code
      # -------------------------------
      - name: Checkout code
        uses: actions/checkout@v4         # Lấy mã nguồn từ repo về môi trường runner

      # -------------------------------
      # 2. Setup JDK 17 (Temurin)
      # -------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17                # Cài đặt Java 17
          distribution: temurin           # Sử dụng bản phân phối Temurin
          cache: maven                    # Kích hoạt cache Maven để build nhanh hơn

      # -------------------------------
      # 3. Wait for services to be ready
      # -------------------------------
      - name: Wait for SQL Server to be ready
        run: |
          echo "Waiting for SQL Server to be ready..."
          sleep 15

      # -------------------------------
      # 4. Build project bằng Maven
      # -------------------------------
      - name: Build with Maven
        run: mvn -B clean package --file pom.xml
        # -B = chế độ batch (không yêu cầu input người dùng)
        # clean package = build lại toàn bộ project, sinh file JAR
        env:
          # Thiết lập biến môi trường để kết nối với services
          SPRING_DATASOURCE_URL: jdbc:sqlserver://localhost:1434;encrypt=false;trustServerCertificate=true
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: Quan#1812@2000
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672

      # -------------------------------
      # 5. Chạy test tự động
      # -------------------------------
      - name: Run tests
        run: mvn test
        env:
          # Thiết lập biến môi trường cho test
          SPRING_DATASOURCE_URL: jdbc:sqlserver://localhost:1434;encrypt=false;trustServerCertificate=true
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: Quan#1812@2000
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672

      # -------------------------------
      # 6. Upload file JAR sau khi build thành công
      # -------------------------------
      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app                       # Tên artifact trên GitHub
          path: target/*.jar              # Đường dẫn file JAR đã build

      # -------------------------------
      # 7. Upload kết quả test (dù pass hay fail)
      # -------------------------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results               # Tên artifact chứa log test
          path: target/surefire-reports/   # Đường dẫn đến báo cáo test Maven